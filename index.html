<!DOCTYPE html>
<html>
<head>
  <title>Noise Collector</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }
    input, button { padding: 10px; margin: 10px; }
  </style>
</head>

<body>

<h2>Campus Noise Collector</h2>

<input id="location" placeholder="Enter Location (Room A)" />
<br>
<button onclick="start()">Start Recording</button>
<button onclick="stop()">Stop</button>

<h3 id="noise">Noise Index: --</h3>
<h4 id="time">Time: 0s</h4>

<script>
let interval;
let seconds = 0;
let analyser;

async function start() {
  const location = document.getElementById("location").value;

  if (!location) {
    alert("Enter location first");
    return;
  }

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  const audioContext = new AudioContext();
  const mic = audioContext.createMediaStreamSource(stream);

  analyser = audioContext.createAnalyser();
  analyser.fftSize = 2048;

  mic.connect(analyser);

  const dataArray = new Uint8Array(analyser.fftSize);

  interval = setInterval(() => {
    analyser.getByteTimeDomainData(dataArray);

    let sum = 0;
    for (let i = 0; i < dataArray.length; i++) {
      let val = (dataArray[i] - 128) / 128;
      sum += val * val;
    }

    let rms = Math.sqrt(sum / dataArray.length);
    if (rms === 0) rms = 0.0001;

    let db = 20 * Math.log10(rms);

    // 🔥 NORMALIZATION (KEY PART)
    let noiseIndex = Math.min(100, Math.max(0, (db + 60) * 2));

    document.getElementById("noise").innerText =
      "Noise Index: " + noiseIndex.toFixed(2);

    seconds++;
    document.getElementById("time").innerText = "Time: " + seconds + "s";

    // send every 5 sec (reduces load)
    if (seconds % 5 === 0) {
      // Changed localhost to 127.0.0.1 to fix Node fetch issues
      fetch("http://127.0.0.1:3000/save", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          location: location,
          noiseIndex: noiseIndex,
          timestamp: new Date()
        })
      })
      .then(response => {
        if (!response.ok) throw new Error("Server rejected request");
        console.log("✅ Data successfully sent to server");
      })
      .catch(error => console.error("❌ Failed to send data. Is the backend running?", error));
    }

  }, 1000);
}

function stop() {
  clearInterval(interval);
  alert("Recording stopped");
}
</script>

</body>
</html>
